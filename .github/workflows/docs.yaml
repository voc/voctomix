name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'doc/**'
      - 'pyproject.toml'

# Allow only one deployment at a time, but don't cancel a run in progress —
# let it finish so the live site is never left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install documentation dependencies
        run: uv pip install --system sphinx sphinx-wagtail-theme

      - name: Build HTML documentation
        run: sphinx-build doc doc/_build/html

      - name: Build man pages
        run: sphinx-build -b man doc doc/_build/man

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: doc/_build/html

  deploy:
    name: Deploy documentation to Github Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
